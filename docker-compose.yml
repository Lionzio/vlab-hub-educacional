name: vlab-hub-educacional

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: voxar
      POSTGRES_PASSWORD: voxarpassword
      POSTGRES_DB: voxarhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxar -d voxarhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    # CORREÇÃO: Removido 'pipenv run' pois já instalamos com --system no Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://voxar:voxarpassword@db:5432/voxarhub
      # Garante que a chave lida do .env seja passada ao container
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: